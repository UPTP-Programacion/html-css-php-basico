<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menú con Formularios</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">

    <!-- ① MENÚ DE NAVEGACIÓN -->
    <nav class="menu">
      <button class="tab-btn active"
              data-tab="registro">
        Registro
      </button>
      <button class="tab-btn"
              data-tab="contacto">
        Contacto
        </button>

  <!-- ★ NUEVO BOTÓN -->
  <button class="tab-btn"
          data-tab="formularioRegistro">
    Formulario de Registro
  </button>

      </button>
    </nav>

    <!-- ② FORMULARIO 1: REGISTRO -->
    <section id="registro" class="form-panel active">
      <h2>Crear cuenta</h2>
      <form>
        <label>Nombre</label>
        <input type="text" placeholder="Tu nombre"/>

        <label>Email</label>
        <input type="email" placeholder="tu@email.com"/>

        <label>Contraseña</label>
        <input type="password" placeholder="••••••••"/>

        <button type="submit">Registrarse</button>
      </form>
    </section>

    <!-- ③ FORMULARIO 2: CONTACTO -->
    <section id="contacto" class="form-panel">
      <h2>Contáctanos</h2>
      <form>
        <label>Asunto</label>
        <input type="text" placeholder="¿En qué podemos ayudar?"/>

        <label>Mensaje</label>
        <textarea rows="4"
                  placeholder="Escribe tu mensaje aquí..."></textarea>

        <button type="submit">Enviar mensaje</button>
      </form>

</section>
<section id="formularioRegistro" class="form-panel">
  <h2>Formulario de Registro</h2>
  <iframe
    src="formularioRegistro.html"
    width="100%"
    height="700"
    style="border: none; border-radius: 8px;"
  ></iframe>
</section>
  </div>

  <script src="app.js"></script>
</body>
</html>
